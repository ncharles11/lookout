services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: lookout-db
    environment:
      POSTGRES_DB: lookout
      POSTGRES_USER: lookout
      POSTGRES_PASSWORD: lookout
    volumes:
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lookout -d lookout"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: lookout-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://lookout:lookout@db:5432/lookout
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
    container_name: lookout-frontend
    depends_on:
      - backend

  proxy:
    image: caddy:2-alpine
    container_name: lookout-proxy
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
