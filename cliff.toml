[changelog]
header = """
# Changelog\n
All notable changes to **Lookout** are documented here.\
Format follows [Keep a Changelog](https://keepachangelog.com/en/1.0.0/).\
Versioning follows [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n
"""

body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
          {{ commit.message | upper_first }}\
          {% if commit.breaking %} ⚠️ **BREAKING**{% endif %} \
          ([`{{ commit.id | truncate(length=7, end="") }}`](<REPO>/commit/{{ commit.id }}))\
          {% if commit.links %} — {% for link in commit.links %}[{{ link.text }}]({{ link.href }}){% if not loop.last %}, {% endif %}{% endfor %}{% endif %}\
    {% endfor %}
{% endfor %}\n
"""

trim = true

footer = """
{% for release in releases %}\
    {% if release.version %}\
        {% if release.previous.version %}\
            [{{ release.version | trim_start_matches(pat="v") }}]: \
                <REPO>/compare/{{ release.previous.version }}...{{ release.version }}
        {% endif %}\
    {% else %}\
        [Unreleased]: <REPO>/compare/{{ release.previous.version }}...HEAD
    {% endif %}\
{% endfor %}
"""

output = "CHANGELOG.md"

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false

# Normalise commit messages before parsing
commit_preprocessors = [
  # Strip trailing whitespace and periods from subject
  { pattern = '\s+$', replace = "" },
  # Extract GitHub issue / PR references
  { pattern = '\(#([0-9]+)\)', replace = "([#${1}](<REPO>/issues/${1}))" },
]

commit_parsers = [
  # ── Breaking changes (always first) ──────────────────────────────────────
  { breaking = true, group = "⚠️  Breaking Changes" },

  # ── Domain: Alerting engine ───────────────────────────────────────────────
  { message = "^feat(alert|fsm|flap|hysteresis|window)", group = "🚨 Alerting & Anti-Flapping Engine" },
  { message = "^fix(alert|fsm|flap|hysteresis|window)",  group = "🚨 Alerting & Anti-Flapping Engine" },
  { message = "^(feat|fix|refactor).*alert",             group = "🚨 Alerting & Anti-Flapping Engine" },

  # ── Domain: Monitoring & Probers ─────────────────────────────────────────
  { message = "^feat(prober|probe|blackbox|whitebox|agent|scheduler|tcp|http)", group = "📡 Monitoring & Probers" },
  { message = "^fix(prober|probe|blackbox|whitebox|agent|scheduler|tcp|http)",  group = "📡 Monitoring & Probers" },
  { message = "^(feat|fix|refactor).*prober",            group = "📡 Monitoring & Probers" },
  { message = "^(feat|fix|refactor).*scheduler",         group = "📡 Monitoring & Probers" },
  { message = "^(feat|fix|refactor).*agent",             group = "📡 Monitoring & Probers" },

  # ── API ───────────────────────────────────────────────────────────────────
  { message = "^feat(api|rest|ws|websocket|endpoint|router)", group = "🔌 API" },
  { message = "^fix(api|rest|ws|websocket|endpoint|router)",  group = "🔌 API" },

  # ── Database & Migrations ─────────────────────────────────────────────────
  { message = "^(feat|fix|refactor)(db|database|migration|schema|timescale|hypertable|retention)", group = "🗄️  Database & Migrations" },
  { message = "^(feat|fix|refactor).*migration",         group = "🗄️  Database & Migrations" },
  { message = "^(feat|fix|refactor).*schema",            group = "🗄️  Database & Migrations" },

  # ── Infrastructure & Deployment ───────────────────────────────────────────
  { message = "^(feat|fix)(infra|docker|compose|ci|cd|deploy|dockerfile)", group = "🐳 Infrastructure & Deployment" },
  { message = "^ci",                                     group = "🐳 Infrastructure & Deployment" },
  { message = "^build",                                  group = "🐳 Infrastructure & Deployment" },

  # ── Frontend & Dashboard ──────────────────────────────────────────────────
  { message = "^feat(ui|frontend|dashboard|hud|chart|widget)", group = "🖥️  Frontend & Dashboard" },
  { message = "^fix(ui|frontend|dashboard|hud|chart|widget)",  group = "🖥️  Frontend & Dashboard" },

  # ── Security ──────────────────────────────────────────────────────────────
  { message = "^(feat|fix)(security|auth|jwt|token|rate.?limit)", group = "🔒 Security" },
  { message = "^(feat|fix).*security",                   group = "🔒 Security" },

  # ── New features (catch-all for unscoped feat) ────────────────────────────
  { message = "^feat", group = "✨ New Features" },

  # ── Bug fixes (catch-all for unscoped fix) ────────────────────────────────
  { message = "^fix", group = "🐛 Bug Fixes" },

  # ── Performance ───────────────────────────────────────────────────────────
  { message = "^perf", group = "⚡ Performance" },

  # ── Refactoring ───────────────────────────────────────────────────────────
  { message = "^refactor", group = "♻️  Refactoring" },

  # ── Tests ─────────────────────────────────────────────────────────────────
  { message = "^test", group = "🧪 Tests" },

  # ── Documentation ─────────────────────────────────────────────────────────
  { message = "^docs", group = "📖 Documentation" },

  # ── Dependencies ──────────────────────────────────────────────────────────
  { message = "^(deps|dep|chore\\(deps\\))", group = "📦 Dependencies" },

  # ── Maintenance (chore / style / revert — shown but de-emphasised) ────────
  { message = "^chore",  group = "🔧 Maintenance" },
  { message = "^style",  group = "🔧 Maintenance" },
  { message = "^revert", group = "🔧 Maintenance" },

  # ── Skip noise ────────────────────────────────────────────────────────────
  { message = "^Merge (pull request|branch|remote)", skip = true },
  { message = "^wip",                                skip = true },
]

# Only keep commits that touch at least one of these paths (leave empty to keep all)
filter_commits = false

# Tag pattern to match releases
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+(\\-rc\\.[0-9]+)?"

# Include commits between the previous tag and HEAD for unreleased section
ignore_tags = ""

# Sort commits within each group newest-first
sort_commits = "newest"

[remote.github]
owner = "charlesaugustendiaye"
repo  = "lookout"
